<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>故事生成器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --bg: #F4F0EB;
  --surface: #FFFFFF;
  --border: #D8D0C8;
  --ink: #2A2825;
  --ink-2: #6B6460;
  --accent: #C07858;
  --accent-soft: #EEDDD5;
  --green: #7EAD88;
  --green-soft: #E0F0E4;
  --sidebar-w: 380px;
  --preview-font: 'Noto Sans SC', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ===== TOP BAR ===== */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  flex-shrink: 0;
  gap: 16px;
}
.topbar-logo {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 20px;
  color: var(--accent);
  letter-spacing: 3px;
  flex-shrink: 0;
}
.topbar-tabs {
  display: flex;
  gap: 4px;
}
.tab-btn {
  padding: 5px 16px;
  border-radius: 6px;
  border: 1.5px solid transparent;
  font-size: 13px;
  cursor: pointer;
  font-family: 'ZCOOL KuaiLe', cursive;
  letter-spacing: 1px;
  transition: all 0.2s;
  background: none;
  color: var(--ink-2);
}
.tab-btn.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}
.tab-btn:hover:not(.active) { background: var(--bg); }

.topbar-actions { display: flex; gap: 8px; flex-shrink:0; }
.btn {
  padding: 6px 16px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.18s;
}
.btn-ghost {
  background: none;
  border: 1.5px solid var(--border);
  color: var(--ink-2);
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 6px rgba(192,120,88,0.25);
}
.btn-primary:hover { background: #b06848; }

/* ===== MAIN LAYOUT ===== */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== EDITOR PANEL ===== */
.editor-panel {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1.5px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.editor-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.editor-scroll::-webkit-scrollbar { width: 4px; }
.editor-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ===== SECTION GROUPS ===== */
.section-group {
  margin-bottom: 24px;
}
.section-title {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--accent-soft);
}

.field { margin-bottom: 12px; }
.field label {
  display: block;
  font-size: 12px;
  color: var(--ink-2);
  margin-bottom: 4px;
  font-weight: 500;
}
.field input, .field textarea, .field select {
  width: 100%;
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--ink);
  background: #FAFAF8;
  transition: border-color 0.2s;
  resize: vertical;
}
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none;
  border-color: var(--accent);
}
.field textarea { min-height: 72px; }

/* Color row */
.color-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.color-field label { font-size: 11.5px; color: var(--ink-2); display: block; margin-bottom: 4px; }
.color-field input[type="color"] {
  width: 100%;
  height: 36px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  padding: 2px 4px;
  background: #FAFAF8;
}

/* ===== CHAPTERS ===== */
.chapters-list { display: flex; flex-direction: column; gap: 8px; }
.chapter-card {
  border: 1.5px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  background: #FAFAF8;
}
.chapter-header {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  gap: 8px;
  cursor: pointer;
  user-select: none;
  background: var(--bg);
  border-bottom: 1px solid transparent;
  transition: all 0.2s;
}
.chapter-header:hover { background: var(--accent-soft); }
.chapter-header.open { border-bottom-color: var(--border); }
.chapter-num-badge {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 16px;
  color: var(--accent);
  flex-shrink: 0;
  width: 20px;
  text-align: center;
}
.chapter-name-preview {
  flex: 1;
  font-size: 12.5px;
  color: var(--ink);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chapter-toggle {
  font-size: 10px;
  color: var(--ink-2);
  transition: transform 0.2s;
}
.chapter-header.open .chapter-toggle { transform: rotate(180deg); }
.chapter-delete {
  background: none;
  border: none;
  color: #ccc;
  cursor: pointer;
  font-size: 14px;
  padding: 0 2px;
  line-height: 1;
  transition: color 0.2s;
}
.chapter-delete:hover { color: #E8636F; }
.chapter-body {
  display: none;
  padding: 10px;
  flex-direction: column;
  gap: 8px;
}
.chapter-body.open { display: flex; }

/* Blocks inside chapter */
.block-list { display: flex; flex-direction: column; gap: 6px; }
.block-item {
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  overflow: hidden;
}
.block-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  background: #F5F2EE;
  border-bottom: 1px solid transparent;
  cursor: pointer;
}
.block-header.open { border-bottom-color: var(--border); }
.block-type-tag {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 10px;
  font-family: 'ZCOOL KuaiLe', cursive;
  letter-spacing: 1px;
}
.tag-narrator { background: #EEE8FF; color: #7A5EA8; }
.tag-dialogue { background: var(--green-soft); color: #4A8A55; }
.tag-phone { background: #E0F0FF; color: #4A78B0; }
.tag-quote { background: #2A2825; color: #EEE8E0; }
.tag-monologue { background: var(--accent-soft); color: var(--accent); }
.block-preview {
  flex: 1;
  font-size: 11px;
  color: var(--ink-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.block-del {
  background: none; border: none;
  color: #ccc; cursor: pointer; font-size: 12px;
  padding: 0 2px; line-height: 1;
  transition: color 0.2s;
}
.block-del:hover { color: #E8636F; }
.block-body { display: none; padding: 8px; }
.block-body.open { display: block; }

.block-select {
  width: 100%;
  padding: 5px 8px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  background: #FAFAF8;
  color: var(--ink);
  margin-bottom: 6px;
}
.block-select:focus { outline: none; border-color: var(--accent); }

.add-block-btn {
  width: 100%;
  padding: 6px;
  border: 1.5px dashed var(--border);
  border-radius: 6px;
  background: none;
  font-size: 12px;
  color: var(--ink-2);
  cursor: pointer;
  font-family: 'ZCOOL KuaiLe', cursive;
  letter-spacing: 1px;
  transition: all 0.2s;
  margin-top: 4px;
}
.add-block-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

.add-chapter-btn {
  width: 100%;
  padding: 8px;
  border: 1.5px dashed var(--accent-soft);
  border-radius: 8px;
  background: none;
  font-size: 13px;
  color: var(--accent);
  cursor: pointer;
  font-family: 'ZCOOL KuaiLe', cursive;
  letter-spacing: 2px;
  transition: all 0.2s;
  margin-top: 4px;
}
.add-chapter-btn:hover { background: var(--accent-soft); }

/* Dialogue sub-fields */
.dialogue-fields { display: flex; flex-direction: column; gap: 6px; }
.speaker-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.mini-input {
  width: 100%;
  padding: 5px 8px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  background: #FAFAF8;
  color: var(--ink);
}
.mini-input:focus { outline: none; border-color: var(--accent); }
.mini-textarea {
  width: 100%;
  padding: 5px 8px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  background: #FAFAF8;
  color: var(--ink);
  min-height: 54px;
  resize: vertical;
}
.mini-textarea:focus { outline: none; border-color: var(--accent); }
.mini-label { font-size: 11px; color: var(--ink-2); margin-bottom: 3px; display: block; }

/* Phone chat item */
.phone-msgs { display: flex; flex-direction: column; gap: 5px; }
.phone-msg-row { display: flex; align-items: center; gap: 5px; }
.phone-msg-row select {
  width: 64px;
  padding: 4px 5px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
  background: #FAFAF8;
  color: var(--ink);
  flex-shrink: 0;
}
.phone-msg-row input {
  flex: 1;
  padding: 4px 7px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  background: #FAFAF8;
  color: var(--ink);
}
.phone-msg-row input:focus, .phone-msg-row select:focus { outline: none; border-color: var(--accent); }
.phone-msg-del {
  background: none; border: none; color: #ccc;
  cursor: pointer; font-size: 12px; padding: 0; flex-shrink: 0;
}
.phone-msg-del:hover { color: #E8636F; }
.add-msg-btn {
  width: 100%;
  padding: 4px;
  border: 1px dashed var(--border);
  border-radius: 4px;
  background: none;
  font-size: 11px;
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.2s;
}
.add-msg-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ===== PREVIEW PANEL ===== */
.preview-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #E8E4DE;
}
.preview-label {
  padding: 8px 20px;
  font-size: 11px;
  color: var(--ink-2);
  font-family: 'ZCOOL KuaiLe', cursive;
  letter-spacing: 2px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.preview-frame-wrap {
  flex: 1;
  overflow: auto;
  display: flex;
  justify-content: center;
  padding: 24px 0;
}
.preview-frame-wrap::-webkit-scrollbar { width: 6px; }
.preview-frame-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
#preview-frame {
  width: 480px;
  min-height: 600px;
  border: none;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  background: #fff;
  flex-shrink: 0;
}

/* ===== MOBILE ===== */
@media (max-width: 700px) {
  .main { flex-direction: column; }
  .editor-panel { width: 100%; border-right: none; border-bottom: 1.5px solid var(--border); max-height: 50vh; }
  .preview-panel { flex: 1; }
  #preview-frame { width: calc(100vw - 32px); }
  .topbar { padding: 0 12px; }
  .topbar-logo { font-size: 16px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">故事生成器</div>
  <div class="topbar-tabs">
    <button class="tab-btn active" onclick="switchTab('editor')">✏️ 编辑</button>
    <button class="tab-btn" onclick="switchTab('preview')">👁 预览</button>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="exportHTML()">⬇ 导出 HTML</button>
    <button class="btn btn-primary" onclick="renderPreview()">刷新预览</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- EDITOR -->
  <div class="editor-panel" id="editor-panel">
    <div class="editor-scroll">

      <!-- META -->
      <div class="section-group">
        <div class="section-title">基本信息</div>
        <div class="field">
          <label>故事标题</label>
          <input type="text" id="meta-title" value="叫名字" placeholder="故事标题">
        </div>
        <div class="field">
          <label>副标题</label>
          <input type="text" id="meta-subtitle" value="一个女儿，一个妈妈，一道缝" placeholder="副标题">
        </div>
        <div class="field">
          <label>标签文字（小）</label>
          <input type="text" id="meta-tag" value="图文故事" placeholder="如：图文故事、沸点记录">
        </div>
        <div class="field">
          <label>结尾寄语</label>
          <textarea id="meta-ending" placeholder="结尾文字…">愿每个人都能拥有自己真正想要的生活</textarea>
        </div>
      </div>

      <!-- CHARACTERS -->
      <div class="section-group">
        <div class="section-title">人物设置</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            <div class="field">
              <label>主角称呼</label>
              <input type="text" id="char-a-name" value="我" placeholder="我 / 姐姐…">
            </div>
            <div class="color-field">
              <label>主角气泡颜色</label>
              <input type="color" id="char-a-color" value="#E0F0E4">
            </div>
          </div>
          <div>
            <div class="field">
              <label>对方称呼</label>
              <input type="text" id="char-b-name" value="妈妈" placeholder="妈妈 / 对方…">
            </div>
            <div class="color-field">
              <label>对方气泡颜色</label>
              <input type="color" id="char-b-color" value="#FFF0E8">
            </div>
          </div>
        </div>
      </div>

      <!-- THEME -->
      <div class="section-group">
        <div class="section-title">主题配色</div>
        <div class="color-row">
          <div class="color-field">
            <label>主色调（标题/强调）</label>
            <input type="color" id="theme-accent" value="#C07858">
          </div>
          <div class="color-field">
            <label>页面背景色</label>
            <input type="color" id="theme-bg" value="#F7F3EE">
          </div>
        </div>
      </div>

      <!-- CHAPTERS -->
      <div class="section-group">
        <div class="section-title">章节内容</div>
        <div class="chapters-list" id="chapters-list"></div>
        <button class="add-chapter-btn" onclick="addChapter()">＋ 添加章节</button>
      </div>

    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel" id="preview-panel">
    <div class="preview-label">预览（480px 手机宽度）</div>
    <div class="preview-frame-wrap">
      <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>

</div>

<script>
// ===== DATA MODEL =====
let story = {
  title: '叫名字',
  subtitle: '一个女儿，一个妈妈，一道缝',
  tag: '图文故事',
  ending: '愿每个人都能拥有自己真正想要的生活',
  charA: { name: '我', color: '#E0F0E4' },
  charB: { name: '妈妈', color: '#FFF0E8' },
  accent: '#C07858',
  bg: '#F7F3EE',
  chapters: [
    {
      title: '备注改了',
      numeral: '一',
      blocks: [
        { type: 'narrator', text: '那天改备注，不是一时冲动。\n\n是某次电话吵完，我挂掉后看着"妈"这个字，突然感觉到一种奇怪的东西——\n\n叫妈，所有委屈就变成了心疼。所有道理就变成了眼泪。' },
        { type: 'monologue', text: '所以我把备注改成了她的名字。\n\n不是因为不爱她。\n是因为太爱她，所以那个字让我失去了所有的力气。' }
      ]
    },
    {
      title: '你接受吗',
      numeral: '二',
      blocks: [
        { type: 'phone', header: '—— 微信消息 ——', messages: [
          { side: 'left', text: '有个男孩，家里两套房，就是矮了点，1米68，你接受吗？' },
          { side: 'left', text: '你接受吗？' },
          { side: 'left', text: '你到底接不接受？' }
        ]},
        { type: 'narrator', text: '我没有回复。\n不是因为那个男生矮，是因为这个问题本身——\n"你接受吗"——像是在确认我还有没有挑的资格。' }
      ]
    },
    {
      title: '春节饭桌',
      numeral: '三',
      blocks: [
        { type: 'narrator', text: '春节。回家。饭桌。\n红烧肉的味道还没散，那句话就来了。' },
        { type: 'dialogue', speaker: 'B', text: '你这么下去，以后老了怎么办？没人管你，生病了怎么办？', thought: '' },
        { type: 'dialogue', speaker: 'A', text: '妈，你说的"以后"，我一点都不害怕。\n我害怕的，是为了那个"以后"，现在就把自己嫁出去。', thought: '筷子放下的声音，比我预想的还要轻。' },
        { type: 'narrator', text: '我走回房间，关上门。\n两个人就这样，在同一屋檐下，把那个春节过完了。' }
      ]
    },
    {
      title: '一道缝',
      numeral: '四',
      blocks: [
        { type: 'monologue', text: '妈妈催婚，是因为她真的爱我。\n\n我抗拒，也是因为我真的在认真对待自己的人生。\n\n两种真实，撞在了一起。\n没有坏人，但有裂缝。' },
        { type: 'dialogue', speaker: 'A', text: '妈，我不是不想结婚。\n我只是不想让你替我着急。', thought: '' },
        { type: 'dialogue', speaker: 'B', text: '那我不催了。但你也得答应我，好好的。', thought: '' },
        { type: 'dialogue', speaker: 'A', text: '我会好好的。', thought: '' },
        { type: 'quote', text: '不是谁赢了，也不是谁输了。\n\n是两个爱彼此却活在不同时代逻辑里的人，用各自的方式在说：\n\n我还是在乎你的。' }
      ]
    }
  ]
};

const NUMERALS = ['一','二','三','四','五','六','七','八','九','十'];

// ===== INIT =====
function init() {
  syncFormToStory();
  renderChaptersList();
  renderPreview();
  setupLiveSync();
}

function syncFormToStory() {
  document.getElementById('meta-title').value = story.title;
  document.getElementById('meta-subtitle').value = story.subtitle;
  document.getElementById('meta-tag').value = story.tag;
  document.getElementById('meta-ending').value = story.ending;
  document.getElementById('char-a-name').value = story.charA.name;
  document.getElementById('char-a-color').value = story.charA.color;
  document.getElementById('char-b-name').value = story.charB.name;
  document.getElementById('char-b-color').value = story.charB.color;
  document.getElementById('theme-accent').value = story.accent;
  document.getElementById('theme-bg').value = story.bg;
}

function readFormToStory() {
  story.title = document.getElementById('meta-title').value;
  story.subtitle = document.getElementById('meta-subtitle').value;
  story.tag = document.getElementById('meta-tag').value;
  story.ending = document.getElementById('meta-ending').value;
  story.charA.name = document.getElementById('char-a-name').value;
  story.charA.color = document.getElementById('char-a-color').value;
  story.charB.name = document.getElementById('char-b-name').value;
  story.charB.color = document.getElementById('char-b-color').value;
  story.accent = document.getElementById('theme-accent').value;
  story.bg = document.getElementById('theme-bg').value;
}

function setupLiveSync() {
  ['meta-title','meta-subtitle','meta-tag','meta-ending',
   'char-a-name','char-a-color','char-b-name','char-b-color',
   'theme-accent','theme-bg'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', () => { readFormToStory(); renderPreview(); });
    el.addEventListener('change', () => { readFormToStory(); renderPreview(); });
  });
}

// ===== CHAPTERS UI =====
function renderChaptersList() {
  const list = document.getElementById('chapters-list');
  list.innerHTML = '';
  story.chapters.forEach((ch, ci) => {
    const card = document.createElement('div');
    card.className = 'chapter-card';
    card.innerHTML = `
      <div class="chapter-header" onclick="toggleChapter(${ci}, this)">
        <span class="chapter-num-badge">${ch.numeral || NUMERALS[ci] || (ci+1)}</span>
        <span class="chapter-name-preview">${ch.title || '（未命名章节）'}</span>
        <button class="chapter-delete" onclick="event.stopPropagation();deleteChapter(${ci})" title="删除章节">✕</button>
        <span class="chapter-toggle">▼</span>
      </div>
      <div class="chapter-body" id="ch-body-${ci}">
        <div class="field" style="margin-bottom:6px">
          <label>章节标题</label>
          <input type="text" class="mini-input" value="${escHtml(ch.title)}" oninput="story.chapters[${ci}].title=this.value;updateChapterPreview(${ci});renderPreview()">
        </div>
        <div class="field" style="margin-bottom:8px">
          <label>序号（汉字）</label>
          <input type="text" class="mini-input" style="width:80px" value="${escHtml(ch.numeral||NUMERALS[ci]||String(ci+1))}" oninput="story.chapters[${ci}].numeral=this.value;renderPreview()">
        </div>
        <div class="block-list" id="blocks-${ci}"></div>
        <button class="add-block-btn" onclick="addBlock(${ci})">＋ 添加内容块</button>
      </div>
    `;
    list.appendChild(card);
    renderBlockList(ci);
  });
}

function updateChapterPreview(ci) {
  const card = document.querySelectorAll('.chapter-card')[ci];
  if (card) card.querySelector('.chapter-name-preview').textContent = story.chapters[ci].title || '（未命名章节）';
}

function toggleChapter(ci, header) {
  const body = document.getElementById(`ch-body-${ci}`);
  const isOpen = body.classList.toggle('open');
  header.classList.toggle('open', isOpen);
}

function deleteChapter(ci) {
  if (story.chapters.length <= 1) return alert('至少保留一个章节');
  story.chapters.splice(ci, 1);
  renderChaptersList();
  renderPreview();
}

function addChapter() {
  const idx = story.chapters.length;
  story.chapters.push({ title: '新章节', numeral: NUMERALS[idx] || String(idx+1), blocks: [
    { type: 'narrator', text: '在这里填写叙事文字…' }
  ]});
  renderChaptersList();
  renderPreview();
  // auto open new chapter
  const newHeader = document.querySelectorAll('.chapter-header')[idx];
  if (newHeader) toggleChapter(idx, newHeader);
}

// ===== BLOCKS UI =====
const BLOCK_LABELS = {
  narrator: '旁白',
  dialogue: '对话',
  phone: '手机聊天',
  quote: '金句卡片',
  monologue: '内心独白'
};
const BLOCK_TAG_CLASS = {
  narrator: 'tag-narrator',
  dialogue: 'tag-dialogue',
  phone: 'tag-phone',
  quote: 'tag-quote',
  monologue: 'tag-monologue'
};

function renderBlockList(ci) {
  const container = document.getElementById(`blocks-${ci}`);
  if (!container) return;
  container.innerHTML = '';
  story.chapters[ci].blocks.forEach((block, bi) => {
    const item = document.createElement('div');
    item.className = 'block-item';
    const preview = getBlockPreview(block);
    item.innerHTML = `
      <div class="block-header" onclick="toggleBlock(this, '${ci}-${bi}')">
        <span class="block-type-tag ${BLOCK_TAG_CLASS[block.type]}">${BLOCK_LABELS[block.type]}</span>
        <span class="block-preview">${escHtml(preview)}</span>
        <button class="block-del" onclick="event.stopPropagation();deleteBlock(${ci},${bi})">✕</button>
      </div>
      <div class="block-body" id="block-body-${ci}-${bi}">
        ${renderBlockEditor(ci, bi, block)}
      </div>
    `;
    container.appendChild(item);
  });
}

function getBlockPreview(block) {
  if (block.type === 'phone') return block.header || '手机消息';
  if (block.type === 'dialogue') return (block.text || '').replace(/\n/g,' ').slice(0,30);
  return (block.text || '').replace(/\n/g,' ').slice(0,30);
}

function toggleBlock(header, id) {
  const body = document.getElementById(`block-body-${id}`);
  const isOpen = body.classList.toggle('open');
  header.classList.toggle('open', isOpen);
}

function deleteBlock(ci, bi) {
  story.chapters[ci].blocks.splice(bi, 1);
  renderBlockList(ci);
  renderPreview();
}

function addBlock(ci) {
  story.chapters[ci].blocks.push({ type: 'narrator', text: '' });
  renderBlockList(ci);
  renderPreview();
  // auto open
  const blocks = document.querySelectorAll(`#blocks-${ci} .block-header`);
  const last = blocks[blocks.length - 1];
  if (last) {
    const bi = story.chapters[ci].blocks.length - 1;
    toggleBlock(last, `${ci}-${bi}`);
  }
}

function renderBlockEditor(ci, bi, block) {
  const typeSelect = `
    <select class="block-select" onchange="changeBlockType(${ci},${bi},this.value)">
      ${['narrator','dialogue','phone','quote','monologue'].map(t =>
        `<option value="${t}" ${block.type===t?'selected':''}>${BLOCK_LABELS[t]}</option>`
      ).join('')}
    </select>
  `;

  let fields = '';

  if (block.type === 'narrator' || block.type === 'quote' || block.type === 'monologue') {
    fields = `<textarea class="mini-textarea" placeholder="输入文字…" oninput="story.chapters[${ci}].blocks[${bi}].text=this.value;renderPreview()">${escHtml(block.text||'')}</textarea>`;
  }

  if (block.type === 'dialogue') {
    const aName = story.charA.name || '我';
    const bName = story.charB.name || '对方';
    fields = `
      <div class="dialogue-fields">
        <div class="speaker-row">
          <div>
            <span class="mini-label">说话人</span>
            <select class="block-select" style="margin-bottom:0" onchange="story.chapters[${ci}].blocks[${bi}].speaker=this.value;renderPreview()">
              <option value="A" ${block.speaker==='A'?'selected':''}>${aName}（主角）</option>
              <option value="B" ${block.speaker==='B'?'selected':''}>${bName}（对方）</option>
            </select>
          </div>
        </div>
        <span class="mini-label">对话内容</span>
        <textarea class="mini-textarea" placeholder="对话内容…" oninput="story.chapters[${ci}].blocks[${bi}].text=this.value;renderPreview()">${escHtml(block.text||'')}</textarea>
        <span class="mini-label">内心旁白（可留空）</span>
        <input type="text" class="mini-input" placeholder="说完这句话，我想到了…" value="${escHtml(block.thought||'')}" oninput="story.chapters[${ci}].blocks[${bi}].thought=this.value;renderPreview()">
      </div>
    `;
  }

  if (block.type === 'phone') {
    const msgs = block.messages || [];
    const aName = story.charA.name || '我';
    const bName = story.charB.name || '对方';
    const msgsHtml = msgs.map((m, mi) => `
      <div class="phone-msg-row" id="pmsg-${ci}-${bi}-${mi}">
        <select onchange="story.chapters[${ci}].blocks[${bi}].messages[${mi}].side=this.value;renderPreview()">
          <option value="left" ${m.side==='left'?'selected':''}>${bName}</option>
          <option value="right" ${m.side==='right'?'selected':''}>${aName}</option>
        </select>
        <input type="text" value="${escHtml(m.text||'')}" placeholder="消息内容…" oninput="story.chapters[${ci}].blocks[${bi}].messages[${mi}].text=this.value;renderPreview()">
        <button class="phone-msg-del" onclick="deletePhoneMsg(${ci},${bi},${mi})">✕</button>
      </div>
    `).join('');
    fields = `
      <span class="mini-label">标题文字</span>
      <input type="text" class="mini-input" value="${escHtml(block.header||'—— 微信消息 ——')}" placeholder="—— 微信消息 ——" style="margin-bottom:6px" oninput="story.chapters[${ci}].blocks[${bi}].header=this.value;renderPreview()">
      <span class="mini-label">消息列表</span>
      <div class="phone-msgs" id="phone-msgs-${ci}-${bi}">${msgsHtml}</div>
      <button class="add-msg-btn" onclick="addPhoneMsg(${ci},${bi})">＋ 添加消息</button>
    `;
  }

  return typeSelect + fields;
}

function changeBlockType(ci, bi, newType) {
  const old = story.chapters[ci].blocks[bi];
  story.chapters[ci].blocks[bi] = { type: newType, text: old.text || '', thought: '', speaker: 'A', messages: old.messages || [], header: old.header || '' };
  renderBlockList(ci);
  renderPreview();
  // reopen
  const headers = document.querySelectorAll(`#blocks-${ci} .block-header`);
  if (headers[bi]) toggleBlock(headers[bi], `${ci}-${bi}`);
}

function addPhoneMsg(ci, bi) {
  if (!story.chapters[ci].blocks[bi].messages) story.chapters[ci].blocks[bi].messages = [];
  story.chapters[ci].blocks[bi].messages.push({ side: 'left', text: '' });
  renderBlockList(ci);
  renderPreview();
  // reopen
  const headers = document.querySelectorAll(`#blocks-${ci} .block-header`);
  if (headers[bi]) {
    const body = document.getElementById(`block-body-${ci}-${bi}`);
    if (!body.classList.contains('open')) toggleBlock(headers[bi], `${ci}-${bi}`);
  }
}

function deletePhoneMsg(ci, bi, mi) {
  story.chapters[ci].blocks[bi].messages.splice(mi, 1);
  renderBlockList(ci);
  renderPreview();
}

<script>
  const obs = new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:0.08,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.fade-in').forEach(el=>obs.observe(el));
  const sto=document.getElementById('sto');
  window.addEventListener('scroll',()=>sto.classList.toggle('show',scrollY>400));
  sto.addEventListener('click',()=>scrollTo({top:0,behavior:'smooth'}));
  const tocItems=document.querySelectorAll('.toc-item');
  const chs=document.querySelectorAll('[id^="ch"].chapter');
  let sup=null;
  const co=new IntersectionObserver(es=>{if(sup)return;es.forEach(e=>{if(e.isIntersecting){tocItems.forEach(t=>t.classList.toggle('active',t.querySelector('a').getAttribute('href')==='#'+e.target.id));}});},{threshold:0.1,rootMargin:'-10% 0px -70% 0px'});
  chs.forEach(c=>co.observe(c));
  document.querySelectorAll('.toc-item a').forEach(a=>{a.addEventListener('click',()=>{tocItems.forEach(t=>t.classList.toggle('active',t.querySelector('a')===a));clearTimeout(sup);sup=setTimeout(()=>sup=null,900);});});
  document.addEventListener('contextmenu',e=>e.preventDefault());
<\/script>

function renderBlockHTML(block, charA, charB, accent) {
  const aName = charA.name || '我';
  const bName = charB.name || '对方';

  if (block.type === 'narrator') {
    return `  <div class="panel fade-in"><div class="narrator">${nl2br(escHtml(block.text||''))}</div></div>`;
  }
  if (block.type === 'monologue') {
    return `  <div class="panel fade-in"><div class="monologue">${nl2br(escHtml(block.text||''))}</div></div>`;
  }
  if (block.type === 'quote') {
    return `  <div class="quote-card fade-in"><p>${nl2br(escHtml(block.text||''))}</p></div>`;
  }
  if (block.type === 'dialogue') {
    const isA = block.speaker === 'A';
    const name = isA ? aName : bName;
    const cls = isA ? 'a' : 'b';
    const rev = isA ? '' : 'rev';
    const initials = name.slice(-1) || '?';
    const thought = block.thought ? `<span class="thought">${escHtml(block.thought)}</span>` : '';
    return `  <div class="panel fade-in">
    <div class="dialogue-row ${rev}">
      <div class="avatar" style="background:${isA ? charA.color : charB.color}">${initials}</div>
      <div class="bwrap">
        <div class="bname">${escHtml(name)}</div>
        <div class="bubble ${cls}">${nl2br(escHtml(block.text||''))}${thought}</div>
      </div>
    </div>
  </div>`;
  }
  if (block.type === 'phone') {
    const msgs = (block.messages || []).map(m => {
      const cls = m.side === 'right' ? 'right' : '';
      return `    <div class="msg-row ${cls}"><div class="msg-bubble ${m.side==='right'?'right':'left'}">${nl2br(escHtml(m.text||''))}</div></div>`;
    }).join('\n');
    return `  <div class="panel fade-in">
    <div class="phone-chat">
      <div class="phone-header">${escHtml(block.header||'—— 微信消息 ——')}</div>
${msgs}
    </div>
  </div>`;
  }
  return '';
}

// ===== PREVIEW =====
let previewDebounce = null;
function renderPreview() {
  clearTimeout(previewDebounce);
  previewDebounce = setTimeout(() => {
    const html = generateHTML();
    const frame = document.getElementById('preview-frame');
    frame.srcdoc = html;
  }, 300);
}

// ===== EXPORT =====
function exportHTML() {
  readFormToStory();
  const html = generateHTML();
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (story.title || 'story') + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===== TAB SWITCH (mobile) =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const edPanel = document.getElementById('editor-panel');
  const pvPanel = document.getElementById('preview-panel');
  if (window.innerWidth <= 700) {
    edPanel.style.display = tab === 'editor' ? 'flex' : 'none';
    pvPanel.style.display = tab === 'preview' ? 'flex' : 'none';
  }
}

// ===== UTILS =====
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function nl2br(s) {
  return s.replace(/\n/g,'<br>');
}
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

init();
